spring.application.name=springai-test
spring.ai.anthropic.api-key=test-api-key-fake
app.security.username=testuser
app.security.password=testpass
app.security.max-auth-attempts=3
app.security.block-duration-minutes=15
app.cors.allowed-headers=Content-Type,Authorization,X-Requested-With

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.info.env.enabled=true
