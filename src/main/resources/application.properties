spring.application.name=springai
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Security
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD}
app.security.max-auth-attempts=${MAX_AUTH_ATTEMPTS:5}
app.security.block-duration-minutes=${BLOCK_DURATION_MINUTES:15}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Content-Type,Authorization,X-Requested-With}

# HTTPS / TLS
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:springai}
server.port=${SERVER_PORT:8443}

# Rate limiting
app.ratelimit.cache-max-size=${RATELIMIT_CACHE_MAX_SIZE:100000}
app.ratelimit.cache-expiry-hours=${RATELIMIT_CACHE_EXPIRY_HOURS:1}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.info.env.enabled=true
info.app.name=springai
info.app.version=@project.version@

# Logging
logging.level.com.tdevilleduc.springai=INFO
