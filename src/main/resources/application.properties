spring.application.name=springai
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Security
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD}

# HTTPS / TLS
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:springai}
server.port=${SERVER_PORT:8443}
